# dev/nginx.conf
# OpenResty config for the lapis-memory dev container.
# Mounted read-only by docker-compose; NOT part of the installed library.

worker_processes 1;
# Run workers as root in dev so they can write to Docker named volumes.
# Never use this in production.
user root;
error_log stderr notice;
pid /tmp/nginx.pid;

# Preserve env vars that Lua code reads via os.getenv().
# OpenResty strips all inherited env vars by default.
env MEMO_MASTER_KEY;

events {
    worker_connections 1024;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;

    # Load the library directly from the mounted repo — no luarocks install needed.
    # /app/dev/  first so config.lua and app.lua resolve correctly.
    # /app/       makes require("lapis_memory") find /app/lapis_memory/init.lua.
    # /usr/share/lua/5.1/  is where Alpine's lua5.1-* apk packages install.
    lua_package_path  "/app/dev/?.lua;/app/dev/?/init.lua;/app/?.lua;/app/?/init.lua;/usr/share/lua/5.1/?.lua;/usr/share/lua/5.1/?/init.lua;/usr/share/lua/common/?.lua;/usr/share/lua/common/?/init.lua;/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lualib/?/init.lua;;";
    lua_package_cpath "/usr/lib/lua/5.1/?.so;/usr/local/openresty/lualib/?.so;;";

    # Required by lapis_memory/secrets.lua for the multi-worker write lock.
    lua_shared_dict lm_lock 64k;

    # Hot-reload: any .lua change takes effect on the next request.
    # Do NOT use in production.
    lua_code_cache off;

    init_by_lua_block {
        -- Warm up the Lapis config so the first request is fast.
        require("lapis.config")
    }

    server {
        listen 8765;

        # Docker's internal DNS resolver — required for OpenResty to resolve
        # service names like "db" at runtime via ngx.socket (used by pgmoon).
        resolver 127.0.0.11 valid=30s;
        resolver_timeout 5s;

        location / {
            default_type text/html;
            content_by_lua_block {
                require("lapis").serve("app")
            }
        }
    }
}
